<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佐仓 - 启动中</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%}
*{box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0d1117;color:#ecf0f1;display:flex;justify-content:center;align-items:center;height:100vh}
.loading-box{text-align:center}
.loading-box h1{font-size:28px;color:#5390d4;margin-bottom:24px;font-weight:400;letter-spacing:4px}
.steps{display:flex;flex-direction:column;gap:10px;align-items:center}
.step{font-size:13px;color:#7f8c8d;display:flex;align-items:center;gap:8px;transition:color .3s}
.step .dot{width:8px;height:8px;border-radius:50%;background:#2c3e50;transition:background .3s}
.step.done{color:#4caf50}.step.done .dot{background:#4caf50}
.step.active{color:#5390d4}.step.active .dot{background:#5390d4;animation:pulse .8s infinite}
.step.error{color:#e74c3c}.step.error .dot{background:#e74c3c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loader{margin-top:24px;width:140px;height:3px;background:#2c3e50;border-radius:2px;overflow:hidden}
.loader-bar{height:100%;width:0;background:#5390d4;border-radius:2px;transition:width .4s ease}
.msg{font-size:11px;color:#555;margin-top:20px}
</style>
</head>
<body>
<div class="loading-box">
  <h1>佐仓</h1>
  <div class="steps">
    <div class="step" id="s1"><span class="dot"></span>启动后端服务</div>
    <div class="step" id="s2"><span class="dot"></span>加载 AI 模型</div>
    <div class="step" id="s3"><span class="dot"></span>准备聊天界面</div>
  </div>
  <div class="loader"><div class="loader-bar" id="bar"></div></div>
  <div class="msg" id="msg"></div>
</div>
<script>
var port = parseInt(new URLSearchParams(location.search).get('port')) || 8001;

var steps = ['s1','s2','s3'];
var current = 0;
function setStep(n, status) {
  var el = document.getElementById(steps[n]);
  if (el) { el.classList.remove('active','error'); el.classList.add(status); }
  document.getElementById('bar').style.width = ((n+1)/steps.length*100) + '%';
}

setStep(0, 'active');

function poll() {
  fetch('http://127.0.0.1:' + port + '/')
    .then(function(r) { return r.text() })
    .then(function(txt) {
      if (txt.indexOf('佐仓') > -1 || txt.indexOf('index') > -1 || txt.indexOf('app') > -1 || txt.length > 200) {
        setStep(0, 'done');
        setStep(1, 'active');
        setTimeout(function(){
          setStep(1, 'done');
          setStep(2, 'active');
          setTimeout(function(){
            setStep(2, 'done');
            document.getElementById('msg').textContent = '就绪，正在进入...';
            setTimeout(function(){ location.href = 'http://127.0.0.1:' + port + '/'; }, 300);
          }, 400);
        }, 600);
      } else {
        setTimeout(poll, 500);
      }
    })
    .catch(function() {
      document.getElementById('msg').textContent = '等待服务就绪...';
      setTimeout(poll, 800);
    });
}

setTimeout(poll, 200);
</script>
</body>
</html>
